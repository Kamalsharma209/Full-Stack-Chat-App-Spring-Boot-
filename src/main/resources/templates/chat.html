<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chat App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
</head>

<body>

<div class="container mt-4">
    <h2 class="text-center">Real-Time Chat 🚀</h2>

    <!-- Username -->
    <h5>Welcome, <span id="username"></span></h5>

    <!-- Chat Box -->
    <div id="chat" class="border p-3 mb-3" style="height:300px; overflow-y:auto;">

        <!-- ✅ Load old messages -->
        <div th:each="msg : ${messages}">
            <p><b th:text="${msg.sender}"></b>: <span th:text="${msg.content}"></span></p>
        </div>

    </div>

    <div class="input-group">
        <input id="messageInput" class="form-control" placeholder="Type message...">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<script th:inline="javascript">
    let stompClient = null;

    const username = /*[[${username}]]*/ "User";
    document.getElementById("username").innerText = username;

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log("Connected ✅");

            stompClient.subscribe('/topic/messages', function (msg) {
                const message = JSON.parse(msg.body);
                showMessage(message);
            });
        });
    }

    function showMessage(message) {
        const chat = document.getElementById("chat");

        const div = document.createElement("p");
        div.innerHTML = "<b>" + message.sender + "</b>: " + message.content;

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        const content = document.getElementById("messageInput").value;
        if (!content) return;

        stompClient.send("/app/sendMessage", {}, JSON.stringify({
            sender: username,
            content: content
        }));

        document.getElementById("messageInput").value = "";
    }

    window.onload = connect;
</script>

</body>
</html>
